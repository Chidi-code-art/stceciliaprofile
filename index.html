<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choir QR Download</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #2a5298, #1e3c72);
        color: #fff;
    }

    .wrapper {
        text-align: center;
        padding: 40px;
    }

    h1 {
        font-size: 22px;
        font-weight: 500;
        margin-bottom: 30px;
        line-height: 1.4;
    }

    #qrcode {
        background: #fff;
        padding: 20px;
        border-radius: 20px;
        display: inline-block;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .note {
        margin-top: 20px;
        font-size: 13px;
        opacity: 0.7;
    }

</style>
</head>

<body>

<div class="wrapper">
    <h1>Scan to download our Choir Profile<br>& Programme of Events</h1>
    
    <div id="qrcode"></div>

</div>

<!-- QR Code generator (client-side) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    // This will be your hosted page URL automatically
    const pageURL = window.location.href;

    // Generate QR Code
    new QRCode(document.getElementById("qrcode"), {
        text: pageURL,
        width: 220,
        height: 220
    });

    // Auto-download trigger
    window.onload = function() {
        setTimeout(() => {
            const link = document.createElement('a');
            link.href = "Easter_cantata_profile.pdf";
            link.download = "Choir_Profile.pdf";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }, 1200);
    };
</script>

</body>
</html>
